<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CA Finance Toolkit</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>CA Finance Toolkit</h1>

<p class="subtitle">
Open-source finance tools for students and professionals
</p>

<div class="cards">

<div class="card">
<h2>GST Interest Calculator</h2>

<input type="number" id="amount" placeholder="GST Amount">

<input type="number" id="days" placeholder="Delay (Days)">

<button onclick="calculateInterest()">
Calculate
</button>

<h3 id="interestResult"></h3>

</div>

<div class="card">

<h2>GST Late Fee Calculator</h2>

<input type="number" id="lateDays" placeholder="Delay (Days)">

<button onclick="calculateLateFee()">
Calculate
</button>

<h3 id="lateFeeResult"></h3>

</div>

<div class="card">

<h2>EMI Calculator</h2>

<p>Coming Soon</p>

</div>

<div class="card">

<h2>Financial Ratio Calculator</h2>

<p>Coming Soon</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
